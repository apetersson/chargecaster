stages:
  - publish

workflow:
  rules:
    # Only release tags publish images; this avoids rebuilding the same commit
    # on both `main` and `vX.Y.Z`.
    - if: $CI_COMMIT_TAG

variables:
  KANIKO_IMAGE: gcr.io/kaniko-project/executor:v1.23.2-debug

.kaniko:
  image:
    name: $KANIKO_IMAGE
    entrypoint:
      - ""
  interruptible: true
  tags:
    - docker
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"${CI_REGISTRY}":{"username":"${CI_REGISTRY_USER}","password":"${CI_REGISTRY_PASSWORD}"}}}
      EOF

publish:tag:
  stage: publish
  extends: .kaniko
  script:
    # Frontend and backend are versioned separately so the UI can warn if they
    # ever diverge, even though release CI normally stamps them with one tag.
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --build-arg "FRONTEND_BUILD_VERSION=${CI_COMMIT_TAG}"
      --build-arg "BACKEND_BUILD_VERSION=${CI_COMMIT_TAG}"
      --build-arg "VITE_TRPC_URL=/trpc"
      --cache=true
      --cache-repo "${CI_REGISTRY_IMAGE}/cache"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}:latest"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG
