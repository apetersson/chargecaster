stages:
  - verify
  - publish-base
  - publish

workflow:
  rules:
    # Release tags always get a pipeline so we can verify and then publish.
    - if: $CI_COMMIT_TAG
    # Merge requests get their own verification pipeline.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Skip duplicate default-branch push pipelines. The release tag pipeline is
    # the authoritative post-merge publish path, and feature branches still get
    # verified through MR pipelines before they land here.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never
    # When a branch already has an open MR, skip the duplicate push pipeline.
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Plain branch pushes still get verification even without an MR yet.
    - if: $CI_COMMIT_BRANCH

variables:
  KANIKO_IMAGE: gcr.io/kaniko-project/executor:v1.23.2-debug
  PNPM_STORE_DIR: .pnpm-store

default:
  interruptible: true

.node:
  image: node:22-bookworm
  tags:
    - docker
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

verify:typecheck:
  stage: verify
  extends: .node
  script:
    - pnpm run typecheck:all

verify:audit:
  stage: verify
  extends: .node
  script:
    # Keep the release gates honest on transitive security drift, not just
    # compile/test drift.
    - pnpm audit

verify:build:
  stage: verify
  extends: .node
  script:
    - pnpm run build:all

verify:backend-unit:
  stage: verify
  extends: .node
  script:
    - pnpm --filter chargecaster-backend test

verify:backend-e2e:
  stage: verify
  extends: .node
  script:
    - pnpm --filter chargecaster-backend test:e2e
  rules:
    # Keep the slower integration-style check on the protected branch and tags.
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.kaniko:
  image:
    name: $KANIKO_IMAGE
    entrypoint:
      - ""
  interruptible: true
  tags:
    - docker
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"${CI_REGISTRY}":{"username":"${CI_REGISTRY_USER}","password":"${CI_REGISTRY_PASSWORD}"}}}
      EOF

prepare:runtime-ml-base:
  stage: publish-base
  image: alpine:3.20
  interruptible: true
  tags:
    - docker
  before_script:
    - apk add --no-cache git
  script:
    - git fetch --force --tags origin
    - |
      set -eu

      previous_release_tag="$(
        git tag --list 'v*' --sort=-v:refname \
          | grep -Fxv "${CI_COMMIT_TAG}" \
          | head -n 1 || true
      )"

      current_base_ref="${CI_REGISTRY_IMAGE}/runtime-ml-base:${CI_COMMIT_SHORT_SHA}"

      if [ -z "${previous_release_tag}" ]; then
        echo "No previous release tag found; rebuilding runtime-ml-base."
        should_build="true"
        selected_base_ref="${current_base_ref}"
      elif git diff --quiet "${previous_release_tag}..${CI_COMMIT_TAG}" -- \
        Dockerfile \
        backend/package.json \
        backend/ml/requirements.txt \
        backend/assets/load-forecast
      then
        previous_release_sha="$(git rev-parse --short=8 "${previous_release_tag}^{commit}")"
        should_build="false"
        selected_base_ref="${CI_REGISTRY_IMAGE}/runtime-ml-base:${previous_release_sha}"
        echo "Reusing runtime-ml-base from ${previous_release_tag} (${previous_release_sha})."
      else
        should_build="true"
        selected_base_ref="${current_base_ref}"
        echo "Runtime ML inputs changed since ${previous_release_tag}; rebuilding base image."
      fi

      {
        printf 'RUNTIME_ML_BASE_SHOULD_BUILD=%s\n' "${should_build}"
        printf 'RUNTIME_ML_BASE_IMAGE_REF=%s\n' "${selected_base_ref}"
        printf 'PREVIOUS_RELEASE_TAG=%s\n' "${previous_release_tag}"
      } > runtime-ml-base.env
  artifacts:
    reports:
      dotenv: runtime-ml-base.env
  rules:
    - if: $CI_COMMIT_TAG

publish:runtime-ml-base:
  stage: publish-base
  extends: .kaniko
  needs:
    - prepare:runtime-ml-base
  script:
    - |
      set -eu

      if [ "${RUNTIME_ML_BASE_SHOULD_BUILD}" != "true" ]; then
        echo "Skipping runtime-ml-base rebuild for ${CI_COMMIT_TAG}; using ${RUNTIME_ML_BASE_IMAGE_REF}."
        exit 0
      fi

      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --target runtime-ml-base \
        --cache=true \
        --cache-copy-layers \
        --cache-repo "${CI_REGISTRY_IMAGE}/cache" \
        --reproducible \
        --destination "${RUNTIME_ML_BASE_IMAGE_REF}"
  rules:
    - if: $CI_COMMIT_TAG

publish:tag:
  stage: publish
  extends: .kaniko
  needs:
    - prepare:runtime-ml-base
    - publish:runtime-ml-base
  script:
    # Frontend and backend are versioned separately so the UI can warn if they
    # ever diverge, even though release CI normally stamps them with one tag.
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --build-arg "FRONTEND_BUILD_VERSION=${CI_COMMIT_TAG}"
      --build-arg "BACKEND_BUILD_VERSION=${CI_COMMIT_TAG}"
      --build-arg "RUNTIME_ML_BASE_IMAGE=${RUNTIME_ML_BASE_IMAGE_REF}"
      --build-arg "VITE_TRPC_URL=/trpc"
      --cache=true
      --cache-copy-layers
      --cache-repo "${CI_REGISTRY_IMAGE}/cache"
      --reproducible
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}:latest"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG
